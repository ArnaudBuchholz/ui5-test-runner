name: Node.js CI

on:
  push:
    paths-ignore:
      - 'docs/**'
      - 'articles/**'
      - '.github/**'
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions: { contents: read }
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version-file: .nvmrc
        cache: 'npm'
    - run: npm ci
    - run: npm test
    - name: Archive E2E results (on failure)
      uses: actions/upload-artifact@v7
      if: failure()
      with:
        name: e2e-reports
        path: e2e/
